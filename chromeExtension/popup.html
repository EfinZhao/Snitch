<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>Snitch</title>
</head>
<body>
  <div class="popup">
    <!-- Branded header matching web app -->
    <header class="header">
      <span class="wordmark">Snitch</span>
      <div class="header-right">
        <label class="block-toggle" title="Block flagged sites" id="blockToggleWrap">
          <input type="checkbox" id="blockToggle" />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
          <span class="toggle-label" id="toggleLabel">Block</span>
        </label>
        <button id="logoutBtn" class="logout-btn hidden" title="Log out">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Login view (shown when not authenticated) -->
    <div id="loginView" class="login-view hidden">
      <div class="login-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </div>
      <h2 class="login-title">Sign in to Snitch</h2>
      <p class="login-subtitle">Connect your account to sync distractions</p>
      <div class="login-form">
        <div class="input-wrapper">
          <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
          <input type="email" id="loginEmail" placeholder="Email" autocomplete="email" />
        </div>
        <div class="input-wrapper">
          <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" />
        </div>
        <p id="loginError" class="error hidden"></p>
        <button id="loginBtn" class="btn-primary login-btn">
          SIGN IN
        </button>
      </div>
    </div>

    <!-- Main content (shown when authenticated) -->
    <div id="mainView">

    <!-- Active session panel with live timer arc -->
    <div id="sessionPanel" class="session-panel hidden">
      <div class="session-arc-wrap">
        <svg viewBox="0 0 180 180" width="180" height="180" class="session-arc-svg">
          <!-- Track ring -->
          <circle cx="90" cy="90" r="76" fill="none" stroke="var(--outline-variant)" stroke-width="5" />
          <!-- Elapsed progress arc (rotated so 0% = top, drains clockwise) -->
          <circle
            id="arcProgress"
            cx="90" cy="90" r="76"
            fill="none"
            stroke="var(--primary)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-dasharray="477.52"
            stroke-dashoffset="0"
            transform="rotate(-90 90 90)"
            style="transition: stroke-dashoffset 1s linear, stroke 0.4s ease;"
          />
          <!-- Distraction tick marks -->
          <g id="arcTicks"></g>
        </svg>
        <div class="session-arc-center">
          <span id="sessionTimeDisplay" class="session-time">--:--</span>
          <span class="session-status-label">Focus session</span>
        </div>
      </div>
      <div class="session-meta">
        <span id="sessionStrikesBadge" class="session-strikes">0 / 3 strikes</span>
        <span id="sessionAmountLabel" class="session-amount">$0.00 on the line</span>
      </div>
    </div>

    <!-- Quick stats -->
    <section class="stats-row">
      <div class="stat-card card-sketch">
        <span class="stat-value" id="flaggedCount">0</span>
        <span class="stat-label">Sites Flagged</span>
      </div>
      <div class="stat-card card-sketch">
        <span class="stat-value" id="todayCount">0</span>
        <span class="stat-label">Today's Visits</span>
      </div>
    </section>

    </div><!-- /mainView -->

    <!-- Footer -->
    <footer class="footer">
      Snitch v1.0.0
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
